# ============================================
# AdminPlugin 메시지 설정 파일
# 파스텔톤 HEX 컬러 사용: <#HEX코드>텍스트
# 플레이스홀더: <playername>, <value> 등
# ============================================

# 접두사
prefix: "<#B4D4FF>[AdminPlugin]<#FFFFFF> "

# 일반 메시지
general:
  plugin-enabled: "<#B4D4FF>AdminPlugin<#FFFFFF> 플러그인이 활성화되었습니다."
  plugin-disabled: "<#FFB4B4>AdminPlugin<#FFFFFF> 플러그인이 비활성화되었습니다."
  no-permission: "<#FFB4B4>권한이 없습니다."
  player-only: "<#FFB4B4>플레이어만 사용할 수 있는 명령어입니다."
  reload-success: "<#B4FFB4>설정 파일을 다시 불러왔습니다."
  unknown-command: "<#FFB4B4>알 수 없는 명령어입니다. <#FFD6A5>/adminplugin help<#FFB4B4>를 확인해주세요."

# 도움말
help:
  header: "<#B4D4FF>===== AdminPlugin 도움말 <#FFD6A5>(<page>/<maxpage>) <#B4D4FF>====="
  format: "<#FFD6A5>[/<command>] <#FFFFFF>/<command> <sub> : <#D4B4FF><description>"
  footer-prev: "<#B4D4FF>[ 이전 ]"
  footer-page: "<#FFD6A5>[<page>/<maxpage>]"
  footer-next: "<#B4D4FF>[ 다음 ]"
  no-prev-page: "<#FFB4B4>첫 번째 페이지입니다."
  no-next-page: "<#FFB4B4>마지막 페이지입니다."
