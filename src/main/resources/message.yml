# ============================================
# AdminPlugin 메시지 설정 파일
# 파스텔톤 HEX 컬러 사용: <#HEX코드>텍스트
# 플레이스홀더: <playername>, <value> 등
# ============================================

# 접두사
prefix: "<#B4D4FF>[AdminPlugin]<#FFFFFF> "

# 일반 메시지
general:
  plugin-enabled: "<#B4D4FF>AdminPlugin<#FFFFFF> 플러그인이 활성화되었습니다."
  plugin-disabled: "<#FFB4B4>AdminPlugin<#FFFFFF> 플러그인이 비활성화되었습니다."
  no-permission: "<#FFB4B4>권한이 없습니다."
  player-only: "<#FFB4B4>플레이어만 사용할 수 있는 명령어입니다."
  reload-success: "<#B4FFB4>설정 파일을 다시 불러왔습니다."
  unknown-command: "<#FFB4B4>알 수 없는 명령어입니다. <#FFD6A5>/adminplugin help<#FFB4B4>를 확인해주세요."

# 도움말
help:
  header: "<#B4D4FF>===== AdminPlugin 도움말 <#FFD6A5>(<page>/<maxpage>) <#B4D4FF>====="
  format: "<#FFD6A5>[/<command>] <#FFFFFF>/<command> <sub> : <#D4B4FF><description>"
  footer-prev: "<#B4D4FF>[ 이전 ]"
  footer-page: "<#FFD6A5>[<page>/<maxpage>]"
  footer-next: "<#B4D4FF>[ 다음 ]"
  no-prev-page: "<#FFB4B4>첫 번째 페이지입니다."
  no-next-page: "<#FFB4B4>마지막 페이지입니다."

# 관리자 명령어 메시지
admin:
  # 벤 시스템
  ban:
    success: "<#B4FFB4><target> 님을 차단했습니다. <#D4B4FF>사유: <reason>"
    already-banned: "<#FFB4B4><target> 님은 이미 차단되어 있습니다."
    screen: "<#FFB4B4>서버에서 차단되었습니다.\n\n<#D4B4FF>사유: <#FFFFFF><reason>\n<#D4B4FF>차단자: <#FFFFFF><admin>"
    broadcast: "<#FFFAB4><target> 님이 서버에서 차단되었습니다. <#D4B4FF>사유: <reason>"
    player-not-found: "<#FFB4B4>플레이어를 찾을 수 없습니다: <target>"

  tempban:
    success: "<#B4FFB4><target> 님을 <#FFD6A5><duration><#B4FFB4> 동안 차단했습니다. <#D4B4FF>사유: <reason>"
    screen: "<#FFB4B4>서버에서 임시 차단되었습니다.\n\n<#D4B4FF>사유: <#FFFFFF><reason>\n<#D4B4FF>남은 시간: <#FFFFFF><remaining>\n<#D4B4FF>차단자: <#FFFFFF><admin>"
    invalid-duration: "<#FFB4B4>올바른 시간 형식을 입력해주세요. <#D4B4FF>예: 1h30m, 2d, 1w"
    broadcast: "<#FFFAB4><target> 님이 <#FFD6A5><duration><#FFFAB4> 동안 차단되었습니다."

  permaban:
    success: "<#B4FFB4><target> 님을 영구 차단했습니다. <#D4B4FF>사유: <reason>"
    screen: "<#FFB4B4>서버에서 영구 차단되었습니다.\n\n<#D4B4FF>사유: <#FFFFFF><reason>\n<#D4B4FF>차단자: <#FFFFFF><admin>"
    broadcast: "<#FFFAB4><target> 님이 서버에서 영구 차단되었습니다."

  unban:
    success: "<#B4FFB4><target> 님의 차단을 해제했습니다."
    not-found: "<#FFB4B4><target> 님은 차단 기록이 없습니다."
    broadcast: "<#B4FFB4><target> 님의 차단이 해제되었습니다."

  # 킥 시스템
  kick:
    success: "<#B4FFB4><target> 님을 추방했습니다. <#D4B4FF>사유: <reason>"
    screen: "<#FFB4B4>서버에서 추방되었습니다.\n\n<#D4B4FF>사유: <#FFFFFF><reason>\n<#D4B4FF>추방자: <#FFFFFF><admin>"
    broadcast: "<#FFFAB4><target> 님이 서버에서 추방되었습니다."
    player-not-found: "<#FFB4B4>온라인 플레이어를 찾을 수 없습니다: <target>"

  # 모두정지 시스템
  freeze:
    enabled: "<#FFFAB4>모든 플레이어가 정지되었습니다."
    disabled: "<#B4FFB4>모든 플레이어의 정지가 해제되었습니다."
    notice: "<#FFB4B4>서버 전체 정지 중입니다. 움직일 수 없습니다."

  # 채팅잠금 시스템
  chatlock:
    enabled: "<#FFFAB4>채팅이 잠겼습니다."
    disabled: "<#B4FFB4>채팅 잠금이 해제되었습니다."
    blocked: "<#FFB4B4>현재 채팅이 잠겨 있습니다."

  # 아이템 지급 시스템
  giveall:
    success: "<#B4FFB4>모든 플레이어에게 <#FFD6A5><itemname> x<amount><#B4FFB4>을(를) 지급했습니다."
    must-hold-item: "<#FFB4B4>아이템을 손에 들고 사용해주세요."
    invalid-amount: "<#FFB4B4>올바른 수량을 입력해주세요."

  giverandom:
    success: "<#B4FFB4>무작위 <#FFD6A5><count><#B4FFB4>명에게 <#FFD6A5><itemname> x<amount><#B4FFB4>을(를) 지급했습니다."
    not-enough-players: "<#FFB4B4>서버에 충분한 플레이어가 없습니다. <#D4B4FF>(현재: <online>명)"
    winners: "<#B4D4FF>당첨자: <#FFFFFF><players>"

  # 랜덤 추첨 시스템
  draw:
    result: "<#FFFAB4>■ 랜덤 추첨 결과 ■"
    entry: "<#FFD6A5><index>. <#FFFFFF><playername>"
    not-enough-players: "<#FFB4B4>서버에 충분한 플레이어가 없습니다. <#D4B4FF>(현재: <online>명)"

  # 채팅금지(뮤트) 시스템
  mute:
    success: "<#B4FFB4><target> 님의 채팅을 금지했습니다. <#D4B4FF>사유: <reason>"
    already-muted: "<#FFB4B4><target> 님은 이미 채팅 금지 상태입니다."
    blocked: "<#FFB4B4>채팅이 금지되어 있습니다. <#D4B4FF>사유: <reason>"
    broadcast: "<#FFFAB4><target> 님의 채팅이 금지되었습니다."

  tempmute:
    success: "<#B4FFB4><target> 님의 채팅을 <#FFD6A5><duration><#B4FFB4> 동안 금지했습니다. <#D4B4FF>사유: <reason>"
    blocked: "<#FFB4B4>채팅이 금지되어 있습니다. <#D4B4FF>남은 시간: <remaining> <#D4B4FF>사유: <reason>"
    invalid-duration: "<#FFB4B4>올바른 시간 형식을 입력해주세요. <#D4B4FF>예: 1h30m, 2d, 1w"
    broadcast: "<#FFFAB4><target> 님의 채팅이 <#FFD6A5><duration><#FFFAB4> 동안 금지되었습니다."

  # 공통 사용법
  usage:
    ban: "<#FFD6A5>사용법: /관리자 벤 <유저> <사유>"
    tempban: "<#FFD6A5>사용법: /관리자 기간벤 <유저> <시간> <사유>"
    permaban: "<#FFD6A5>사용법: /관리자 영구벤 <유저> <사유>"
    unban: "<#FFD6A5>사용법: /관리자 언벤 <유저>"
    kick: "<#FFD6A5>사용법: /관리자 킥 <유저> <사유>"
    giveall: "<#FFD6A5>사용법: /관리자 모두주기 <수량>"
    giverandom: "<#FFD6A5>사용법: /관리자 랜덤주기 <인원> <수량>"
    draw: "<#FFD6A5>사용법: /관리자 랜덤추첨 <인원>"
    mute: "<#FFD6A5>사용법: /관리자 채팅금지 <유저> <사유>"
    tempmute: "<#FFD6A5>사용법: /관리자 시간채팅금지 <유저> <시간> <사유>"
