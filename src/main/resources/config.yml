# ============================================
# AdminPlugin 플러그인 설정 파일
# ============================================

# 데이터베이스 설정
database:
  mysql:
    host: "127.0.0.1"       # MySQL 서버 주소
    port: 3306               # MySQL 포트
    database: "minecraft"    # 데이터베이스 이름
    username: "root"         # 접속 계정
    password: ""             # 접속 비밀번호
    table_prefix: "oops_adminplugin_"  # 테이블 접두사 (필수)

# Redis 설정 (필요시 활성화)
redis:
  enabled: false             # Redis 사용 여부
  host: "127.0.0.1"         # Redis 서버 주소
  port: 6379                 # Redis 포트
  password: ""               # Redis 비밀번호

# 디버그 설정
debug:
  enabled: false             # 디버그 모드 활성화 여부
